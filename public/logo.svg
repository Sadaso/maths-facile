<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 50" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Icon: rounded square with gradient -->
  <rect x="0" y="1" width="48" height="48" rx="12" fill="url(#g)"/>
  <!-- Integral sign -->
  <path d="M14 8c3.5-2 6.5 1 7.5 6l4 18c1 5 4 8 7.5 6" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M14 42c-2-1-3-3-2-5" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Calculator grid -->
  <rect x="25" y="12" width="9" height="9" rx="2.5" fill="rgba(255,255,255,0.8)"/>
  <rect x="36" y="12" width="9" height="9" rx="2.5" fill="rgba(255,255,255,0.8)"/>
  <rect x="25" y="23" width="9" height="9" rx="2.5" fill="rgba(255,255,255,0.8)"/>
  <rect x="36" y="23" width="9" height="9" rx="2.5" fill="rgba(255,255,255,0.8)"/>
  <!-- +, -, x, = -->
  <text x="27" y="20" font-family="Arial" font-size="8" font-weight="700" fill="#7c3aed">+</text>
  <text x="38.5" y="19.5" font-family="Arial" font-size="9" font-weight="700" fill="#7c3aed">−</text>
  <text x="27.5" y="31" font-family="Arial" font-size="7.5" font-weight="700" fill="#7c3aed">×</text>
  <text x="38.5" y="31" font-family="Arial" font-size="8" font-weight="700" fill="#7c3aed">=</text>
  <!-- MATHS text -->
  <text x="58" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="800" letter-spacing="1.5" fill="#38bdf8">MATHS</text>
  <!-- FACILE text -->
  <text x="58" y="46" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" letter-spacing="4" fill="#8b5cf6">FACILE</text>
</svg>
